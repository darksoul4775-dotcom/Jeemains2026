}

.header-left {

}

.header-center {

}

.header-right {

}

.header-right img {
    height: 50px;

    /* Main container */
    .container {
        max-width: 600px;

        background: #ffffff;
        border: 1px solid #cfd6df;
    }

    .title-bar {
        background: #03204a;
        color: #ffffff;

    }

        padding: 30px;

        display: flex;
        align-items: center;
        text-align: right;
        margin-bottom: 15px;
        font-size: 14px;
    }

    .form-row label {
        width: 180px;
    }

    .form-row input {
        width: 250px;
        padding: 6px;
        border: 1px solid #aeb6bf;
    }

    .captcha-row {
        display: flex;
        align-items: center;
        gap: 10px;

    .captcha-box {
        background: #0b1692;
        color: #ffffff;
        font-size: 21px;
        padding: 2px 15px;

    }

    .refresh {
        color: green;
        font-size: 18px;
        cursor: pointer;
    }

    .login-btn {
        margin-left: 180px;
        margin-top: 10px;
        padding: 10px 12px;
        background: #1e8449;
        color: #ffffff;
        font-size: 17px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
    }

    .login-btn:hover {
        background: #145a32;
    }

    .forgot {
        margin-left: 130px;
        color: #0000ee;
        font-size: 13px;
        border: none;
        font-weight: bold;
    }

    .forgot a {
        color: #0000ee;

        background: #03204a;
